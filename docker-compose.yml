services:
  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_PORT=3000
        - REACT_APP_MQTT_BROKER_HOST=raspberrypi.local
        - REACT_APP_MQTT_BROKER_WS_PORT=8083
        - REACT_APP_DEFAULT_TOPIC=zigbee2mqtt/+
    environment:
      CHOKIDAR_USEPOLLING: "true"
    container_name: zigbee-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    stdin_open: true
    tty: true
    command: npm run start
    volumes:
      - ./frontend/src:/usr/src/app/src
    networks:
      - zigbee-network

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: zigbee-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8083:8083"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log/mosquitto.log:/mosquitto/log/mosquitto.log
    networks:
      - zigbee-network

  zigbee2mqtt:
    image: ghcr.io/koenkk/zigbee2mqtt:latest
    restart: unless-stopped
    container_name: zigbee-zigbee2mqtt
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Jerusalem
    volumes:
      - ./zigbee2mqtt/data:/app/data
      - /run/udev:/run/udev:ro
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    depends_on:
      - mosquitto
    networks:
      - zigbee-network

  influxdb:
    image: influxdb:2-alpine
    restart: unless-stopped
    container_name: zigbee-influxdb
    ports:
      - "8088:8088"
    networks:
      - zigbee-network
    volumes:
      - ./influxdb/data:/var/lib/influxdb
      - ./influxdb/init:/docker-entrypoint-initdb.d
    #      - ./influxdb/influxdb.conf:/etc/influxdb/influxdb.conf
    environment:
      - INFLUXDB_DATABASE=$INFLUXDB_DATABASE
      - INFLUXDB_ADMIN_USER=$INFLUXDB_ADMIN_USER
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_ADMIN_PASSWORD}
      - INFLUXDB_HTTP_AUTH_ENABLED=true
      - INFLUXDB_TELEGRAF_USER=${INFLUXDB_TELEGRAF_USER}
      - INFLUXDB_TELEGRAF_PASSWORD=${INFLUXDB_TELEGRAF_PASSWORD}
      - INFLUXDB_GRAFANA_USER=${INFLUXDB_GRAFANA_USER}
      - INFLUXDB_GRAFANA_PASSWORD=${INFLUXDB_GRAFANA_PASSWORD}

  telegraf:
    image: telegraf:1.39.1-alpine
    restart: unless-stopped
    container_name: zigbee-telegraf
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    depends_on:
      - mosquitto
      - influxdb
    networks:
      - zigbee-network
    environment:
      - INFLUXDB_DATABASE=${INFLUXDB_DATABASE}
      - INFLUXDB_TELEGRAF_USER=${INFLUXDB_TELEGRAF_USER}
      - INFLUXDB_TELEGRAF_PASSWORD=${INFLUXDB_TELEGRAF_PASSWORD}

