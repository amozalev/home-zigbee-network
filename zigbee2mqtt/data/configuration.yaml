homeassistant:
  enabled: false
mqtt:
  base_topic: zigbee2mqtt
  server: mqtt://mosquitto:1883
  user: zigbee
  password: test
serial:
  adapter: zstack
  port: /dev/ttyUSB0
queue:
  delay: 5
advanced:
  log_output:
    - console
  log_level: info
  cache_state: true
  cache_state_persistent: true
  last_seen: ISO_8601_local
#  channel: 15
device_options: { }
zigbee_shepherd_devices: true
frontend:
  enabled: true
  port: 8080
availability:
  enabled: true
  passive:
    timeout: 180
devices:
  - devices.yaml
version: 5